"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в•ӯ](fg:overlay0)\
$os\
$status\
$jobs\
$directory\
$git_branch\
$git_status\
$fill\
$golang\
$nodejs\
$bun\
$deno\
$python\
$java\
$zig\
$rust\
$c\
$cmd_duration\
$custom\
$time\
$username\
$line_break\
$character\
"""

add_newline = true

# Palettes must be defined _after_ this line
