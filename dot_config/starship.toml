# Teal
[os]
format = "[оӮ¶](fg:teal)[$symbol](fg:surface1 bg:teal)[оӮҙ](fg:teal)"
disabled = false

[os.symbols]
Windows = "оҳӘ"
Ubuntu = "пҢӣ"

# Red
[status]
format = "[в”Җ](fg:overlay0)[оӮ¶](fg:red)[ ](fg:surface1 bg:red)[оӮҙ](fg:red bg:base)[ $status](fg:text bg:base)[оӮҙ](fg:base)"
pipestatus = true
pipestatus_separator = "-"
pipestatus_segment_format = "$status"
pipestatus_format = "[в”Җ](fg:overlay0)[оӮ¶](fg:red)[ ](fg:text bg:red)[оӮҙ](fg:red bg:base)[ $pipestatus](fg:text bg:base)[оӮҙ](fg:base)"
disabled = false

# Sky
[jobs]
format = "[-](fg:overlay0)[оӮ¶](fg:sky)[$symbol](fg:surface1 bg:sky)[оӮҙ](fg:sky)[ $number](fg:text bg:base)[оӮҙ](fg:base)"
symbol = "у°Ј–"
number_threshold = 1
disabled = false

# Blue
[directory]
format = '[в”Җ](fg:overlay0)[оӮ¶](fg:blue)[о—ҝ](fg:surface1 bg:blue)[оӮҙ](fg:blue bg:base)[ $read_only$truncation_symbol$path](fg:text bg:base)[оӮҙ](fg:base)'
home_symbol = "~"
truncation_symbol = ""
truncation_length = 2
read_only = ""
read_only_style = ""

# Peach
[git_branch]
format = '[в”Җ](fg:overlay0)[оӮ¶](fg:peach)[$symbol](fg:surface1 bg:peach)[оӮҙ](fg:peach bg:base)[ $branch](fg:text bg:base)'
symbol = "у°Ҡў"

[git_status]
format = '[$all_status](fg:peach bg:base)[оӮҙ](fg:base)'
conflicted = ' ='
up_to_date = ''
untracked = ' ?${count}'
stashed = ' $'
modified = ' !${count}'
staged = ' +'
renamed = ' В»'
deleted = ' вңҳ'
ahead = ' вҮЎ${count}'
diverged = ' вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
behind = ' вҮЈ${count}'

# Yellow
[python]
format = '[в”Җ](fg:overlay0)[оӮ¶](fg:yellow)[$symbol](fg:surface1 bg:yellow)[оӮҙ](fg:yellow bg:base)[ (${version})(\($virtualenv\))](fg:text bg:base)[оӮҙ](fg:base)'
symbol = 'оңј'

[fill]
symbol = 'в”Җ'
style = 'fg:overlay0'

# Maroon
[cmd_duration]
min_time = 500
format = '[в”Җ](fg:overlay0)[оӮ¶](fg:maroon)[уұҰҹ](fg:surface1 bg:maroon)[оӮҙ](fg:maroon bg:base)[ $duration](fg:text bg:base)[оӮҙ](fg:base)'

# Lavender
[time]
format = '[в”Җ](fg:overlay0)[оӮ¶](fg:lavender)[у°…җ](fg:surface1 bg:lavender)[оӮҙ](fg:lavender bg:base)[ $time](fg:text bg:base)[оӮҙ](fg:base)'
time_format = '%H:%M'
disabled = false

# Mauve
[username]
format = '[в”Җ](fg:overlay0)[оӮ¶](fg:mauve)[пҗ•](fg:surface1 bg:mauve)[оӮҙ](fg:mauve bg:base)[ $user](fg:text bg:base)[оӮҙ](fg:base) '
show_always = false

# Rosewater
[custom.nordvpn]
# symbol = "у°–ҹ"
symbol = "у° Ҙ"
format = '[в”Җ](fg:overlay0)[оӮ¶](fg:rosewater)[$symbol](fg:surface1 bg:rosewater)[оӮҙ](fg:rosewater)'
when = "nordvpn_status"

[character]
format = """
[в•°в”Җ$symbol](fg:overlay0) """
success_symbol = '[пғҡ](fg:bold white)'
error_symbol = '[Г—](fg:bold red)'

[profiles]
transient = """$character"""
